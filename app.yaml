apiVersion: v1
kind: ConfigMap
metadata:
  name: escape-pod-code
  namespace: default
data:
  app.py: |
    import http.server, socketserver, urllib.parse, os
    DATA_FILE = "/data/passengers.txt"
    class Handler(http.server.SimpleHTTPRequestHandler):
        def do_GET(self):
            self.send_response(200)
            self.send_header("Content-type", "text/html; charset=utf-8")
            self.end_headers()
            passengers = "No data yet."
            if os.path.exists(DATA_FILE):
                with open(DATA_FILE, "r") as f:
                    passengers = f.read().replace('\n', '<br>')
            html = f"""
            <!DOCTYPE html>
            <html>
            <body>
                <h2>Escape Pod</h2>
                <form method='POST' action='/'>
                    <input type='hidden' name='action' value='add'>
                    <input type='text' name='name' required>
                    <input type='submit' value='Submit'>
                </form>
                <br>
                <form method='POST' action='/'>
                    <input type='hidden' name='action' value='delete'>
                    <input type='submit' value='Delete Last'>
                </form>
                <hr>
                <h3>Results:</h3>
                <div>{passengers}</div>
            </body>
            </html>
            """
            self.wfile.write(html.encode('utf-8'))
        def do_POST(self):
            length = int(self.headers.get('Content-Length', 0))
            post_data = self.rfile.read(length).decode('utf-8')
            parsed = urllib.parse.parse_qs(post_data)
            action = parsed.get('action', [''])[0]
            
            if action == 'add' and 'name' in parsed:
                with open(DATA_FILE, "a") as f:
                    f.write(f"{parsed['name'][0]}\n")
            elif action == 'delete':
                if os.path.exists(DATA_FILE):
                    with open(DATA_FILE, "r") as f:
                        lines = f.readlines()
                    if lines:
                        with open(DATA_FILE, "w") as f:
                            f.writelines(lines[:-1])
                            
            self.send_response(303)
            self.send_header("Location", "/")
            self.end_headers()
    with socketserver.TCPServer(("", 80), Handler) as httpd:
        print("Server started on port 80")
        httpd.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: escape-pod
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: escape-pod
  template:
    metadata:
      labels:
        app: escape-pod
    spec:
      containers:
      - name: web
        image: python:3.10-alpine
        command: ["python", "-u", "/app/app.py"]
        ports:
        - containerPort: 80
        volumeMounts:
        - name: code-volume
          mountPath: /app
        - name: data-volume
          mountPath: /data
      volumes:
      - name: code-volume
        configMap:
          name: escape-pod-code
      - name: data-volume
        persistentVolumeClaim:
          claimName: escape-pod-data
---
apiVersion: v1
kind: Service
metadata:
  name: escape-pod-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: escape-pod
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
