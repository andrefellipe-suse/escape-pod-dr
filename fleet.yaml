defaultNamespace: default

targetCustomizations:
  # Rule 1: If the cluster is Active, deploy normally
  - name: prod-active
    clusterSelector:
      matchLabels:
        dr-state: active

  # Rule 2: If the cluster is Standby, explicitly merge the patch
  - name: prod-standby
    clusterSelector:
      matchLabels:
        dr-state: standby
    kustomize:
      dir: overlays/standby
