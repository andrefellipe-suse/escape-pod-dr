defaultNamespace: default

targetCustomizations:
  # Rule 1: If the cluster is Active, deploy normally
  - name: prod-active
    clusterSelector:
      matchLabels:
        dr-state: active

  # Rule 2: If the cluster is Standby, look in the 'standby' folder for patches
  - name: prod-standby
    clusterSelector:
      matchLabels:
        dr-state: standby
    yaml:
      overlays:
        - standby
